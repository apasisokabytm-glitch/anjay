name: Build Flutter APK

on:
  workflow_dispatch:  # Di-trigger oleh bot Telegram via API

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cek file project.zip
        run: |
          if [ ! -f project.zip ]; then
            echo "❌ File project.zip tidak ditemukan!"
            exit 1
          fi
          echo "✅ File project.zip ditemukan ($(du -sh project.zip | cut -f1))"

      - name: Extract project ZIP
        run: |
          mkdir -p flutter_project
          unzip -o project.zip -d flutter_project
          echo "✅ Isi folder setelah extract:"
          ls -la flutter_project/

      - name: Cek struktur project Flutter
        run: |
          # Cari pubspec.yaml (bisa ada di root atau subfolder)
          PUBSPEC=$(find flutter_project -name "pubspec.yaml" | head -1)
          if [ -z "$PUBSPEC" ]; then
            echo "❌ pubspec.yaml tidak ditemukan!"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$PUBSPEC")
          echo "✅ pubspec.yaml ditemukan di: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter pub get

      - name: Build APK Release
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter build apk --release

      - name: Cari file APK
        run: |
          APK=$(find ${{ env.PROJECT_DIR }}/build -name "*.apk" | head -1)
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "✅ APK ditemukan: $APK"

      - name: Upload APK sebagai Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}
          path: ${{ env.APK_PATH }}
          retention-days: 3
